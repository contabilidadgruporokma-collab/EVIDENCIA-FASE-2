<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Corte y Cierre — GF Diversiones</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════ VARIABLES ══════════════════════════════════════ */
    :root {
      --bg:           #0C0C0C;
      --surface:      #161616;
      --surface2:     #1F1F1F;
      --surface3:     #272727;
      --border:       #2D2D2D;
      --accent:       #F97316;
      --accent-light: #FB923C;
      --accent-dim:   rgba(249,115,22,0.12);
      --text:         #F0EDE8;
      --text-dim:     #888;
      --text-muted:   #484848;
      --success:      #22C55E;
      --success-dim:  rgba(34,197,94,0.12);
      --error:        #EF4444;
      --error-dim:    rgba(239,68,68,0.12);
      --warning:      #F59E0B;
      --warn-dim:     rgba(245,158,11,0.12);
      --purple:       #A78BFA;
      --purple-dim:   rgba(167,139,250,0.12);
      --r:            12px;
      --r-sm:         8px;
      --r-lg:         20px;
      --t:            0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #root { min-height: 100vh; }

    /* ═══════════════════════════════════════ UTILS ══════════════════════════════════════════ */
    .fade-in  { animation: fadeIn  0.30s ease; }
    .slide-up { animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1); }

    @keyframes fadeIn  { from { opacity:0; transform:translateY(8px) }  to { opacity:1; transform:none } }
    @keyframes slideUp { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:none } }

    @keyframes spin  { to { transform:rotate(360deg) } }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

    .spinner {
      display:inline-block; width:18px; height:18px;
      border:2px solid rgba(255,255,255,.25); border-top-color:#fff;
      border-radius:50%; animation:spin .7s linear infinite;
      vertical-align:middle; margin-right:8px;
    }

    /* ═══════════════════════════════════════ BOTONES ════════════════════════════════════════ */
    .btn {
      font-family:'DM Sans',sans-serif; cursor:pointer; width:100%;
      border-radius:var(--r-sm); padding:17px 24px; font-size:15px; font-weight:600;
      border:none; transition:all var(--t); -webkit-tap-highlight-color:transparent;
    }
    .btn:active   { transform:scale(0.98); }
    .btn:disabled { opacity:.45; cursor:not-allowed; transform:none; }

    .btn-primary  { background:var(--accent); color:#fff; }
    .btn-primary:hover:not(:disabled) { background:var(--accent-light); }

    .btn-secondary {
      background:var(--surface2); color:var(--text);
      border:1px solid var(--border); font-weight:500;
    }
    .btn-secondary:hover:not(:disabled) { background:var(--surface3); }

    .btn-ghost {
      background:none; color:var(--text-dim);
      border:1px solid var(--border); width:auto; padding:8px 14px;
      font-size:12px; font-weight:500;
    }
    .btn-ghost:hover { border-color:var(--error); color:var(--error); }

    .btn-icon {
      width:44px; height:44px; padding:0; border-radius:var(--r-sm);
      display:flex; align-items:center; justify-content:center;
      background:transparent; border:none; color:var(--text-dim);
      cursor:pointer; font-size:18px; transition:background var(--t), color var(--t);
      -webkit-tap-highlight-color:transparent;
    }
    .btn-icon:hover { background:var(--surface2); color:var(--text); }

    .eye-icon {
      position:relative; width:23px; height:14px; display:inline-block;
      border:2px solid currentColor; border-radius:50%;
    }
    .eye-icon::before {
      content:""; position:absolute; width:6px; height:6px;
      left:50%; top:50%; transform:translate(-50%,-50%);
      background:currentColor; border-radius:50%;
    }
    .eye-icon::after {
      content:""; position:absolute; left:-3px; right:-3px; top:-4px; height:0;
      background:var(--surface); border-bottom:2px solid currentColor;
      border-radius:0 0 999px 999px; opacity:0; transform-origin:top;
    }
    .eye-icon.blinking::after { animation:eyeBlink 1.35s ease-in-out infinite; }
    @keyframes eyeBlink {
      0%, 38%, 58%, 100% { height:0; opacity:0; }
      46%, 50% { height:20px; opacity:1; }
    }

    /* ═══════════════════════════════════════ INPUTS ═════════════════════════════════════════ */
    .field { display:flex; flex-direction:column; gap:8px; }

    .field-label {
      font-size:11px; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--text-dim);
    }

    .field-input {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r-sm); padding:16px 18px;
      font-size:16px; font-family:'DM Sans',sans-serif; color:var(--text);
      outline:none; width:100%; transition:border-color var(--t), background var(--t);
      -webkit-appearance:none;
    }
    .field-input::placeholder { color:var(--text-muted); }
    .field-input:focus    { border-color:var(--accent); background:var(--surface2); }
    .field-input.has-error { border-color:var(--error); }

    /* ═══════════════════════════════════════ MENSAJES ═══════════════════════════════════════ */
    .msg {
      border-radius:var(--r-sm); padding:12px 16px;
      font-size:13px; line-height:1.5; text-align:center;
    }
    .msg-error   { background:var(--error-dim);   border:1px solid rgba(239,68,68,.3);   color:var(--error); }
    .msg-success { background:var(--success-dim); border:1px solid rgba(34,197,94,.3);  color:var(--success); }
    .msg-warn    { background:var(--warn-dim);    border:1px solid rgba(245,158,11,.3); color:var(--warning); }

    /* ═══════════════════════════════════════ HEADER DE PANTALLA ═════════════════════════════ */
    .screen-header {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:14px 18px; display:flex; align-items:center; gap:12px;
      position:sticky; top:0; z-index:10;
    }
    .header-back {
      width:36px; height:36px; background:var(--surface2); border:1px solid var(--border);
      border-radius:var(--r-sm); display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0; color:var(--text-dim); font-size:20px;
      -webkit-tap-highlight-color:transparent; transition:background var(--t);
    }
    .header-back:hover { background:var(--surface3); }

    .header-title { font-size:15px; font-weight:600; color:var(--text); }
    .header-sub   { font-size:12px; color:var(--text-dim); margin-top:1px; }

    /* ═══════════════════════════════════════ LOGIN ══════════════════════════════════════════ */
    .login-screen {
      min-height:100vh; display:flex; flex-direction:column;
      position:relative; overflow:hidden;
    }

    .login-bg {
      position:absolute; inset:0; z-index:0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -10%, rgba(249,115,22,.18) 0%, transparent 65%),
        radial-gradient(ellipse 55% 40% at 90% 110%,  rgba(249,115,22,.08) 0%, transparent 55%),
        var(--bg);
    }
    .login-grid {
      position:absolute; inset:0; z-index:0;
      background-image:
        linear-gradient(rgba(249,115,22,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,.045) 1px, transparent 1px);
      background-size:44px 44px;
    }

    .login-content {
      position:relative; z-index:1; flex:1;
      display:flex; flex-direction:column; justify-content:center;
      padding:40px 26px; max-width:420px; margin:0 auto; width:100%;
    }

    .login-badge {
      display:inline-flex; align-items:center; gap:9px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:100px; padding:9px 18px; margin-bottom:22px;
    }
    .login-badge-dot {
      width:7px; height:7px; background:var(--accent);
      border-radius:50%; animation:pulse 2.5s ease-in-out infinite;
    }
    .login-badge-text {
      font-size:11px; font-weight:600; letter-spacing:.15em;
      text-transform:uppercase; color:var(--text-dim);
    }

    .login-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(54px,13vw,76px); line-height:.93; letter-spacing:.02em;
    }
    .login-title span { color:var(--accent); }
    .login-subtitle { margin-top:11px; font-size:14px; color:var(--text-dim); font-weight:300; }

    .login-form { margin-top:38px; display:flex; flex-direction:column; gap:16px; }

    .app-version {
      margin-top:18px; text-align:center; font-size:11px; color:var(--text-muted);
      letter-spacing:.08em; text-transform:uppercase;
    }

    /* ═══════════════════════════════════════ QUIEN ERES ═════════════════════════════════════ */
    .quien-screen { min-height:100vh; display:flex; flex-direction:column; }

    .quien-body { flex:1; padding:32px 24px; max-width:420px; margin:0 auto; width:100%; }

    .quien-title {
      font-family:'Bebas Neue',sans-serif; font-size:44px;
      line-height:.95; margin-bottom:10px;
    }
    .quien-desc { font-size:14px; color:var(--text-dim); line-height:1.65; margin-bottom:30px; }

    /* ═══════════════════════════════════════ HOME ═══════════════════════════════════════════ */
    .home-screen { min-height:100vh; display:flex; flex-direction:column; }

    .home-header {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:15px 20px; display:flex; align-items:center; justify-content:space-between;
    }
    .home-brand {
      font-size:10px; font-weight:700; letter-spacing:.14em;
      text-transform:uppercase; color:var(--accent); margin-bottom:3px;
    }
    .home-nombre { font-size:16px; font-weight:600; }

    .home-body {
      flex:1; padding:22px 20px 40px;
      max-width:500px; margin:0 auto; width:100%;
      display:flex; flex-direction:column; gap:24px;
    }

    /* Saludo */
    .greeting-label {
      font-size:11px; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--text-muted); margin-bottom:4px;
    }
    .greeting-title {
      font-family:'Bebas Neue',sans-serif; font-size:38px; line-height:1;
    }
    .greeting-date { margin-top:5px; font-size:13px; color:var(--text-dim); }

    /* Status del día */
    .status-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .status-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r); padding:15px;
    }
    .status-card-label {
      font-size:11px; font-weight:600; letter-spacing:.1em;
      text-transform:uppercase; color:var(--text-muted); margin-bottom:9px;
    }
    .status-pill {
      display:inline-flex; align-items:center; gap:6px;
      font-size:11px; font-weight:600; padding:4px 10px;
      border-radius:100px;
    }
    .status-pill.pendiente { background:var(--warn-dim);    color:var(--warning); }
    .status-pill.listo     { background:var(--success-dim); color:var(--success); }
    .status-pill.vacio     { background:var(--surface2);    color:var(--text-muted); }

    .status-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }

    /* Section title */
    .section-label {
      font-size:11px; font-weight:600; letter-spacing:.14em;
      text-transform:uppercase; color:var(--text-muted);
    }

    /* Tarjetas de acción */
    .action-list { display:flex; flex-direction:column; gap:10px; }

    .action-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r); padding:18px; display:flex; align-items:center;
      gap:15px; cursor:pointer; transition:all var(--t);
      -webkit-tap-highlight-color:transparent; text-align:left; width:100%;
    }
    .action-card:hover  { border-color:var(--accent); background:var(--surface2); }
    .action-card:active { transform:scale(0.98); }
    .action-card.disabled { opacity:.45; cursor:not-allowed; }
    .action-card.disabled:hover { border-color:var(--border); background:var(--surface); transform:none; }
    .action-card.done { border-color:rgba(34,197,94,.3); }
    .action-card.done:hover { border-color:var(--success); }

    .ac-icon {
      width:46px; height:46px; background:var(--accent-dim);
      border-radius:var(--r-sm); display:flex; align-items:center;
      justify-content:center; font-size:21px; flex-shrink:0;
    }
    .action-card.done .ac-icon { background:var(--success-dim); }

    .ac-info  { flex:1; }
    .ac-title { font-size:15px; font-weight:600; margin-bottom:3px; }
    .ac-sub   { font-size:13px; color:var(--text-dim); }
    .ac-arrow { color:var(--text-muted); font-size:20px; flex-shrink:0; }

    /* Placeholder de fase */
    .phase-box {
      background:var(--surface); border:1px dashed var(--border);
      border-radius:var(--r); padding:28px 22px; text-align:center;
    }
    .phase-icon  { font-size:28px; margin-bottom:10px; }
    .phase-title { font-size:14px; font-weight:600; color:var(--text-dim); margin-bottom:5px; }
    .phase-sub   { font-size:12px; color:var(--text-muted); line-height:1.6; }

    /* Admin */
    .role-badge {
      display:inline-flex; align-items:center; gap:6px;
      border-radius:100px; padding:4px 12px;
      font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    }
    .role-admin  { background:var(--purple-dim); color:var(--purple); }
    .role-maestro{ background:var(--accent-dim); color:var(--accent); }

    .suc-chips   { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
    .suc-chip    {
      background:var(--surface2); border:1px solid var(--border);
      border-radius:100px; padding:5px 13px; font-size:12px;
      color:var(--text-dim); font-weight:500;
    }

    /* Responsive ajustes */
    @media (max-height:680px) {
      .login-content  { padding:22px 26px; }
      .login-badge    { margin-bottom:16px; }
      .login-form     { margin-top:22px; gap:12px; }
    }

    /* ═══════════════════════════ FASE 2 — FLUJO CIERRE ═════════════════════════════ */

    /* Barra de progreso */
    .prog-wrap { background:var(--surface2); border-radius:100px; height:3px; width:100%; margin-bottom:6px; }
    .prog-fill  { background:var(--accent); height:3px; border-radius:100px; transition:width .4s ease; }
    .prog-label { font-size:11px; color:var(--text-muted); display:flex; justify-content:space-between; margin-bottom:16px; }

    /* Header de paso */
    .paso-wrap  { padding:20px 20px 32px; max-width:500px; margin:0 auto; width:100%; display:flex; flex-direction:column; gap:20px; }
    .paso-badge { display:inline-flex; align-items:center; gap:6px; font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:4px 10px; border-radius:100px; }
    .badge-oblig { background:var(--accent-dim); color:var(--accent); }
    .badge-opcl  { background:var(--purple-dim); color:var(--purple); }
    .paso-num   { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.1em; }
    .paso-titulo { font-family:'Bebas Neue',sans-serif; font-size:40px; line-height:1; margin-top:2px; }
    .paso-inst  { font-size:14px; color:var(--text-dim); line-height:1.65; }

    /* Zona de cámara */
    .camara-zone {
      border:2px dashed var(--border); border-radius:var(--r-lg);
      padding:44px 20px; text-align:center; background:var(--surface);
      cursor:pointer; transition:border-color var(--t), background var(--t);
      -webkit-tap-highlight-color:transparent;
    }
    .camara-zone:hover  { border-color:var(--accent); background:var(--surface2); }
    .camara-zone:active { transform:scale(0.98); }
    .camara-icon  { font-size:52px; margin-bottom:10px; line-height:1; }
    .camara-label { font-size:15px; font-weight:600; }
    .camara-sub   { font-size:12px; color:var(--text-dim); margin-top:4px; }

    /* Preview foto */
    .preview-wrap  { position:relative; border-radius:var(--r); overflow:hidden; background:var(--surface2); }
    .preview-img   { width:100%; max-height:280px; object-fit:cover; display:block; }
    .preview-badge { position:absolute; top:10px; right:10px; background:rgba(0,0,0,.75); color:#fff; font-size:11px; font-weight:600; padding:4px 12px; border-radius:100px; }
    .preview-btns  { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    /* Subiendo */
    .subiendo-box { text-align:center; padding:40px 20px; }
    .subiendo-icon { font-size:40px; margin-bottom:14px; animation:spin 1s linear infinite; display:inline-block; }
    .subiendo-txt  { font-size:15px; font-weight:600; margin-bottom:6px; }
    .subiendo-sub  { font-size:13px; color:var(--text-dim); }

    /* Pregunta SI/NO */
    .pregunta-titulo { font-size:18px; font-weight:600; line-height:1.4; text-align:center; margin-bottom:24px; }
    .pregunta-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .pq-btn {
      background:var(--surface); border:2px solid var(--border);
      border-radius:var(--r); padding:24px 16px; text-align:center;
      cursor:pointer; transition:all var(--t); font-family:'DM Sans',sans-serif;
      -webkit-tap-highlight-color:transparent;
    }
    .pq-btn:active { transform:scale(0.97); }
    .pq-btn.si { border-color:var(--success); background:var(--success-dim); }
    .pq-btn.no { border-color:var(--border); }
    .pq-btn.no:hover { border-color:var(--text-muted); }
    .pq-icon  { font-size:32px; margin-bottom:8px; }
    .pq-label { font-size:15px; font-weight:600; }
    .pq-sub   { font-size:12px; color:var(--text-dim); margin-top:3px; }

    /* Montos */
    .montos-title { font-family:'Bebas Neue',sans-serif; font-size:36px; line-height:1; }
    .montos-sub   { font-size:13px; color:var(--text-dim); margin-top:4px; margin-bottom:4px; }
    .monto-group  { display:flex; flex-direction:column; gap:12px; }
    .monto-field  { display:flex; flex-direction:column; gap:6px; }
    .monto-label  { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); }
    .monto-input  {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm);
      padding:14px 16px 14px 28px; font-size:17px; font-family:'DM Sans',sans-serif;
      color:var(--text); outline:none; width:100%; -webkit-appearance:none;
      transition:border-color var(--t);
    }
    .monto-input:focus { border-color:var(--accent); }
    .monto-wrap { position:relative; }
    .monto-peso { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:15px; font-weight:500; pointer-events:none; }

    /* Sueldos */
    .sueldo-lista { display:flex; flex-direction:column; gap:8px; }
    .sueldo-row   { display:flex; gap:8px; align-items:center; }
    .sueldo-nombre { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px 14px; font-size:14px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; -webkit-appearance:none; }
    .sueldo-monto  { width:110px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px 14px; font-size:14px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; -webkit-appearance:none; }
    .sueldo-nombre:focus, .sueldo-monto:focus { border-color:var(--accent); }
    .btn-del-sueldo { background:none; border:none; cursor:pointer; color:var(--error); font-size:18px; padding:4px 6px; line-height:1; }
    .btn-add-sueldo { background:var(--surface); border:1px dashed var(--border); border-radius:var(--r-sm); padding:10px; font-size:13px; color:var(--text-dim); cursor:pointer; width:100%; text-align:center; transition:border-color var(--t), color var(--t); font-family:'DM Sans',sans-serif; }
    .btn-add-sueldo:hover { border-color:var(--accent); color:var(--accent); }

    /* Neto calculado */
    .neto-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px 20px; display:flex; align-items:center; justify-content:space-between; }
    .neto-left  { font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); }
    .neto-valor { font-family:'Bebas Neue',sans-serif; font-size:42px; line-height:1; color:var(--accent); }
    .neto-valor.negativo { color:var(--error); }

    /* Resumen de evidencias */
    .ev-lista   { display:flex; flex-direction:column; gap:6px; }
    .ev-row     { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--surface); border-radius:var(--r-sm); border:1px solid var(--border); }
    .ev-icon    { font-size:14px; flex-shrink:0; }
    .ev-label   { flex:1; font-size:13px; color:var(--text); }

// Llamada al Apps Script vía fetch (compatible con Chrome Mobile)
function callScript(params) {
  const qs = Object.entries(params)
    .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(String(v))}`)
    .join('&');

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 20000);

  return fetch(`${APPS_SCRIPT_URL}?${qs}`, {
    method: 'GET',
    redirect: 'follow',
    signal: controller.signal
  })
    .then(r => {
      clearTimeout(timeout);
      if (!r.ok) throw new Error('Error del servidor (' + r.status + ')');
      return r.json();
    })
    .catch(err => {
      clearTimeout(timeout);
      if (err.name === 'AbortError') {
        throw new Error('El servidor tardó demasiado. Inténtalo de nuevo.');
      }
      throw new Error('Sin conexión. Verifica tu internet e inténtalo de nuevo.');
    });
}

function jsonFetch(url, options, timeoutMs = 20000) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), timeoutMs);

  return fetch(url, { ...options, signal: controller.signal })
    .then(r => {
      clearTimeout(timeout);
      if (!r.ok) throw new Error('Error del servidor (' + r.status + ')');
      return r.json();
    })
    .catch(err => {
      clearTimeout(timeout);
      if (err.name === 'AbortError') {
        throw new Error('El servidor tardó demasiado. Inténtalo de nuevo.');
      }
      throw err;
    });
}

// Preparado para Fase 2: login por POST cuando Apps Script ya lo soporte.

      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(params)
    });

    const backendSinPost = !res.success && /fase 1|implementad/i.test(String(res.error || ''));
    if (!backendSinPost) return res;
  } catch (err) {
    if (err.message && err.message.includes('tardó demasiado')) throw err;
  }

  return callScript(params);
}

// ─── Comprimir imagen ─────────────────────────────────────────────────────────
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1600;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = () => reject(new Error('No se pudo procesar la imagen'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.readAsDataURL(file);
  });
}

// ─── Subir foto a Drive vía Apps Script ──────────────────────────────────────
async function subirFoto(payload) {
  try {

      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'subirFoto', ...payload })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Error en servidor');
    return data;
  } catch (err) {
    throw new Error(err.message || 'No se pudo subir la foto. Revisa internet e intenta de nuevo.');
  }
}

    tarjeta:'', efectivo:'', gastos:'', extras:'', faltante:'', sobrante:'', pendiente:'',
    sueldos:[{ nombre:'', monto:'' }]
  });

  const fileRef = useR(null);
  const paso = pasos[pasoIdx];

  // ── Progreso ────────────────────────────────────────────────────────────────

    const ef = parseFloat(montos.efectivo)||0;
    const gs = parseFloat(montos.gastos)||0;
    const ex = parseFloat(montos.extras)||0;
    const fa = parseFloat(montos.faltante)||0;
    const so = parseFloat(montos.sobrante)||0;
    const pe = parseFloat(montos.pendiente)||0;
    return ef - sueldosTotal - gs - ex - fa + so - pe;
  })();

  // ── Iniciar flujo ───────────────────────────────────────────────────────────

    setPasoIdx(0);
    setRegistros([]);
    setErrorMsg('');
    setScreen(pasos[0].obligatoria ? 'foto' : 'pregunta');
  };

  // ── Cámara ──────────────────────────────────────────────────────────────────
  const abrirCamara = () => {
    setErrorMsg('');
    fileRef.current.click();

  const handleFileChange = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = '';
    try {
      const b64 = await compressImage(file);
      setCaptura(b64);
      setScreen('preview');
    } catch(err) {
      setErrorMsg('No se pudo procesar la foto. Inténtalo de nuevo.');
    }
  };

  // ── Confirmar y subir ────────────────────────────────────────────────────────

      avanzar();
    } catch(err) {
      setErrorMsg('⚠️ ' + err.message);

    }

  const omitir = () => {
    setRegistros(prev => [...prev, { id:paso.id, label:paso.label, estado:'omitida', hora:null }]);
    avanzar();
  };

  // ── Avanzar al siguiente paso ────────────────────────────────────────────────
  const avanzar = () => {
    const sig = pasoIdx + 1;
    if (sig >= pasos.length) {
      setScreen('montos');
    } else {
      setPasoIdx(sig);
      setScreen(pasos[sig].obligatoria ? 'foto' : 'pregunta');

  // ── Actualizar monto ─────────────────────────────────────────────────────────
  const setMonto = (k, v) => setMontos(prev => ({ ...prev, [k]: v }));
  const setSueldo = (i, k, v) => setMontos(prev => {
    const sueldos = [...prev.sueldos];
    sueldos[i] = { ...sueldos[i], [k]: v };
    return { ...prev, sueldos };
  });

  const confirmarMontos = () => {

      </div>

  );

  // ── PREGUNTA SI/NO ───────────────────────────────────────────────────────────
  if (screen === 'pregunta') return (
    <div className="home-screen slide-up">

      <div className="screen-header">
        <div>
          <div className="header-title">Cierre {turno} · Paso {pasoIdx+1}/{pasos.length}</div>

        </div>

      {inputCamara}
      <div className="screen-header">
        <div>
          <div className="header-title">Cierre {turno} · Paso {pasoIdx+1}/{pasos.length}</div>
          <div className="header-sub">{shortSuc(session.sucursal)}</div>
        </div>
      </div>
      <div className="paso-wrap">
        <div>
          <div className="prog-wrap"><div className="prog-fill" style={{width: progPct+'%'}} /></div>
          <div className="prog-label"><span>{registros.length} de {pasos.length} evidencias</span><span>{progPct}%</span></div>
        </div>

        <div>
          <span className="paso-badge badge-oblig">Obligatoria</span>
          <div className="paso-titulo" style={{marginTop:'8px'}}>{paso.label}</div>
          <div className="paso-inst">{paso.instruccion}</div>

        <div className="camara-zone" onClick={abrirCamara}>
          <div className="camara-icon">📷</div>
          <div className="camara-label">Tomar foto</div>
          <div className="camara-sub">Toca aquí para abrir la cámara</div>
        </div>
      </div>

  // ── PREVIEW ──────────────────────────────────────────────────────────────────
  if (screen === 'preview') return (

// PANTALLA: LOGIN
// ═══════════════════════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const [usuario,  setUsuario]  = useState('');
  const [password, setPassword] = useState('');
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState('');
  const [showPass, setShowPass] = useState(false);
  const [online,   setOnline]   = useState(navigator.onLine);

  useEffect(() => {
    const updateOnline = () => setOnline(navigator.onLine);
    window.addEventListener('online', updateOnline);
    window.addEventListener('offline', updateOnline);
    return () => {
      window.removeEventListener('online', updateOnline);
      window.removeEventListener('offline', updateOnline);
    };
  }, []);

  const submit = async () => {
    if (!online) {
      setError('Sin conexión. Revisa tu internet e intenta nuevamente.');
      return;
    }
    if (!usuario.trim() || !password.trim()) {
      setError('Ingresa tu usuario y contraseña para continuar.');
      return;
    }
    setLoading(true);
    setError('');
    try {
      const res = await callScript({
        action: 'login',
        u: usuario.trim().toLowerCase(),
        p: password.trim()
      });
      if (res.success) {
        onLogin(res);
      } else {
        setError(res.error || 'Usuario o contraseña incorrectos.');
      }
    } catch(err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  const onKey = (e) => { if (e.key === 'Enter') submit(); };

  return (
    <div className="login-screen">
      <div className="login-bg" />
      <div className="login-grid" />
      <div className="login-content fade-in">

        {/* Logo */}
        <div>
          <div className="login-badge">
            <div className="login-badge-dot" />
            <span className="login-badge-text">GF Diversiones</span>
          </div>
          <div className="login-title">
            CORTE<br />Y <span>CIERRE</span>
          </div>
          <div className="login-subtitle">Registro de evidencias de cierre</div>
        </div>

        {/* Formulario */}
        <div className="login-form">
          {!online && <div className="msg msg-warn">Sin conexión. Revisa tu internet antes de iniciar sesión.</div>}
          {error && <div className="msg msg-error">{error}</div>}

          <div className="field">
            <label className="field-label">Usuario</label>
            <input
              className={`field-input ${error ? 'has-error' : ''}`}
              type="text" placeholder="usuario_sucursal"
              value={usuario}
              onChange={e => { setUsuario(e.target.value); setError(''); }}
              onKeyDown={onKey}
              autoCapitalize="none" autoCorrect="off" autoComplete="username"
            />
          </div>

          <div className="field">
            <label className="field-label">Contraseña</label>
            <div style={{position:'relative'}}>
              <input
                className={`field-input ${error ? 'has-error' : ''}`}
                type={showPass ? 'text' : 'password'} placeholder="••••••••"
                value={password}
                onChange={e => { setPassword(e.target.value); setError(''); }}
                onKeyDown={onKey}
                autoComplete="current-password"
                style={{paddingRight:'52px'}}
              />
              <button
                className="btn-icon"
                type="button"
                aria-label={showPass ? 'Ocultar contraseña' : 'Mostrar contraseña'}
                onClick={() => setShowPass(p => !p)}
                style={{
                  position:'absolute', right:'14px', top:'50%', transform:'translateY(-50%)',
                }}
              >
                <span className={`eye-icon ${showPass ? 'blinking' : ''}`} />
              </button>
            </div>
          </div>

          <button className="btn btn-primary" onClick={submit} disabled={loading}>
            {loading && <span className="spinner" />}
            {loading ? 'Verificando...' : 'Iniciar sesión'}
          </button>
          <div className="app-version">{APP_VERSION}</div>
        </div>

      </div>
    </div>
  );
}

// COMPONENTE RAÍZ
// ═══════════════════════════════════════════════════════════════════════════════════
function App() {
  const [screen,      setScreen]      = useState('login');
  const [loginData,   setLoginData]   = useState(null);
  const [session,     setSession]     = useState(null);
  const [turnoActivo, setTurnoActivo] = useState(null);

  useEffect(() => {
    try {
      const raw  = localStorage.getItem(SESSION_KEY);
      const sess = raw ? JSON.parse(raw) : null;
      if (sessionValida(sess)) { setSession(sess); setScreen('home'); }
      else localStorage.removeItem(SESSION_KEY);
    } catch { localStorage.removeItem(SESSION_KEY); }
  }, []);

  const onLogin = (data) => {
    if ((data.rol || '').toLowerCase() === 'empleado') {
      setLoginData(data); setScreen('quien');
    } else { guardarSesion(data); }
  };

  const onQuienConfirm = (nombre) => guardarSesion({ ...loginData, nombre });

  const guardarSesion = (data) => {
    const sess = { ...data, loginTime: new Date().toISOString() };
    localStorage.setItem(SESSION_KEY, JSON.stringify(sess));
    setSession(sess); setScreen('home');
  };

  const onLogout = () => {
    if (!confirm('\u00bfSeguro que quieres cerrar sesi\u00f3n?')) return;
    localStorage.removeItem(SESSION_KEY);
    setSession(null); setLoginData(null); setTurnoActivo(null); setScreen('login');
  };

  const iniciarCierre = (turno) => { setTurnoActivo(turno); setScreen('cierre'); };
  const volverAlHome  = ()      => { setTurnoActivo(null);  setScreen('home');   };

  if (screen === 'login')  return <LoginScreen onLogin={onLogin} />;

  if (screen === 'quien' && loginData)
    return <QuienEresScreenMejorada loginData={loginData} onConfirm={onQuienConfirm}
             onBack={() => { setLoginData(null); setScreen('login'); }} />;

  if (screen === 'cierre' && session && turnoActivo)
    return <FlujoCierre session={session} turno={turnoActivo}
             onVolver={volverAlHome} onCompletado={volverAlHome} />;

  if (screen === 'home' && session)
    return (session.rol || '').toLowerCase() === 'empleado'
      ? <HomeEmpleado session={session} onLogout={onLogout} onIniciarCierre={iniciarCierre} />
      : <HomeAdmin    session={session} onLogout={onLogout} />;

  return null;
}

root.render(<App />);
